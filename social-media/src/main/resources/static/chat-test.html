<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>social-media chat test</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<style>
  body { font-family: system-ui, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 16px; background: #111; color: #eee; }
  h1 { font-size: 18px; }
  label { display: block; margin-top: 10px; font-size: 13px; color: #aaa; }
  input { width: 100%; padding: 8px; margin-top: 4px; box-sizing: border-box; background: #222; border: 1px solid #444; color: #eee; border-radius: 4px; }
  button { margin-top: 10px; padding: 8px 16px; cursor: pointer; border: none; border-radius: 4px; background: #4a7dff; color: white; }
  button:disabled { background: #444; cursor: not-allowed; }
  #status { margin-top: 10px; font-size: 13px; }
  #status.connected { color: #4caf50; }
  #status.disconnected { color: #f44336; }
  #messages { list-style: none; padding: 0; margin-top: 16px; border-top: 1px solid #333; }
  #messages li { padding: 8px 0; border-bottom: 1px solid #222; }
  #messages li b { color: #4a7dff; }
  .send-row { display: flex; gap: 8px; margin-top: 10px; }
  .send-row input { flex: 1; }
  .send-row button { margin-top: 0; }
</style>
</head>
<body>

<h1>social-media &mdash; live chat test</h1>
<p>Open this page in two browser tabs with different "My user id" values, join the same conversation id in both, and watch messages appear instantly in both tabs.</p>

<label>My user id</label>
<input id="userId" value="1">

<label>Conversation id</label>
<div class="send-row">
  <input id="conversationId" placeholder="e.g. 1 (leave blank to create a new 1:1 chat below)">
  <button id="loadBtn">Join / Load history</button>
</div>

<label>Start a new 1:1 chat with user id</label>
<div class="send-row">
  <input id="otherUserId" placeholder="e.g. 2">
  <button id="createBtn">Create / get conversation</button>
</div>

<div id="status" class="disconnected">Not connected</div>

<ul id="messages"></ul>

<div class="send-row">
  <input id="messageInput" placeholder="Type a message..." disabled>
  <button id="sendBtn" disabled>Send</button>
</div>

<script>
let stompClient = null;
let currentConversationId = null;

const statusEl = document.getElementById('status');
const messagesEl = document.getElementById('messages');
const messageInput = document.getElementById('messageInput');
const sendBtn = document.getElementById('sendBtn');

function addMessage(msg) {
  const li = document.createElement('li');
  li.innerHTML = `<b>${msg.senderId}:</b> ${msg.content}`;
  messagesEl.appendChild(li);
  li.scrollIntoView();
}

function connectAndSubscribe(conversationId) {
  // Normalize the same way the server does when it parses the URL's Long path
  // variable, so e.g. "090" and 90 always resolve to the same topic name.
  conversationId = Number(conversationId);

  if (stompClient) {
    stompClient.disconnect();
  }
  currentConversationId = conversationId;
  document.getElementById('conversationId').value = conversationId;
  messagesEl.innerHTML = '';

  const socket = new SockJS('/ws');
  stompClient = Stomp.over(socket);
  stompClient.debug = null; // quiet console

  stompClient.connect({}, () => {
    statusEl.textContent = 'Connected — subscribed to conversation ' + conversationId;
    statusEl.className = 'connected';
    messageInput.disabled = false;
    sendBtn.disabled = false;

    stompClient.subscribe('/topic/conversations/' + conversationId, (frame) => {
      addMessage(JSON.parse(frame.body));
    });
  }, () => {
    statusEl.textContent = 'Disconnected';
    statusEl.className = 'disconnected';
    messageInput.disabled = true;
    sendBtn.disabled = true;
  });
}

document.getElementById('loadBtn').onclick = async () => {
  const conversationId = document.getElementById('conversationId').value.trim();
  if (!conversationId) { alert('Enter a conversation id, or create one below first.'); return; }

  const res = await fetch(`/conversations/${conversationId}/messages`);
  const history = await res.json();
  messagesEl.innerHTML = '';
  history.forEach(addMessage);

  connectAndSubscribe(conversationId);
};

document.getElementById('createBtn').onclick = async () => {
  const userId = document.getElementById('userId').value.trim();
  const otherUserId = document.getElementById('otherUserId').value.trim();
  if (!userId || !otherUserId) { alert('Fill in both user ids.'); return; }

  const res = await fetch('/conversations', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ group: false, participantIds: [Number(userId), Number(otherUserId)] })
  });
  const conversation = await res.json();
  document.getElementById('conversationId').value = conversation.id;
  connectAndSubscribe(conversation.id);
};

sendBtn.onclick = async () => {
  const userId = document.getElementById('userId').value.trim();
  const content = messageInput.value.trim();
  if (!content || !currentConversationId) return;

  await fetch(`/conversations/${currentConversationId}/messages`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ senderId: Number(userId), content })
  });
  messageInput.value = '';
};

messageInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendBtn.click();
});
</script>

</body>
</html>
