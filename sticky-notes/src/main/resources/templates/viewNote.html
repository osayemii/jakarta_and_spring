<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Notes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="stylesheet" href="/css/viewnote.css">
</head>

<body>
    <div class="blur-background"></div>
    <div class="view-note-form">
        <form th:action="@{/viewNotes}" method="post" id="noteForm">
            <div class="row">
                <!-- Left column -->
                <div class="col-md-20"> <!-- Adjusted column width -->
                    <div class="form-icon">
                        <h4 class="form-signin-heading"><span style="color: #b71515; font-family: 'Brush Script MT', cursive; font-size: 50px;">Sticky-Notes</span></h4>
                    </div>
                    <div class="form-group">
                        <label for="noteSelect" style="margin-top: 20px;">Select Note:</label>
                        <div class="custom-dropdown">
                            <select class="form-control" id="pageSelect" name="page" onchange="showCard(this.value)">
                                <option value="">Select Note</option>
                                <option value="page1">Note 1</option>
                                <option value="page2">Note 2</option>
                                <option value="page3">Note 3</option>
                            </select>
                            <span class="arrow-icon">&#9660;</span>
                            <!-- Custom arrow icon -->
                        </div>
                    </div>
                    <div class="col-md-35">
                        <div class="text-center">
                            <button class="button">View</button>
                            <button class="button">Edit</button>
                            <button class="button">Delete</button>
                            <button class="button">Submit</button>
                            <!-- Dashboard button at the end of the left column -->
                            <br><br><br><br><br><br>
                            <div class="col-md-5" style="display: block; margin-top: 150px;">
                                <!-- Adjusted column width -->
                                <a href="/after_login_dashboard" class="button dashboard-button">
                                    <img src="https://cdn-iconspng.flaticon.com/128/10696/10696056.png" alt="Back Icon" class="icon">Dashboard
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Right column -->
                <div class="col-md-6">
                    <div class="cards" id="cards">
                        <div class="card">
                            <h2 class="card__title" contenteditable="true" id="cardTitle" name="title">Card Title</h2>
                            <p class="card__link" contenteditable="true" id="cardContent" name="content">Various collaborative online encyclopedias were attempted before the start of Wikipedia</p>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>
    <script>
        function showCard(value) {
            var cardsDiv = document.getElementById("cards");
            var cardTitle = document.querySelector(".card__title");
            if (value !== "") {
                cardsDiv.style.display = "grid";
                cardTitle.textContent = "Note " + value.substring(4);
            } else {
                cardsDiv.style.display = "none";
            }
        }
    </script>
</body>

</html>
