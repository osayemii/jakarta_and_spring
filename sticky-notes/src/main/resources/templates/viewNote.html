<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Notes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="stylesheet" href="/css/viewnote.css">
</head>

<body>
    <div class="blur-background"></div>
    <div class="view-note-form">
        <form id="noteForm" onsubmit="return false;">
            <div class="row">
                <!-- Left column -->
                <div class="col-md-20">
                    <div class="form-icon">
                        <h4 class="form-signin-heading"><span
                                style="color: #b71515; font-family: 'Brush Script MT', cursive; font-size: 50px;">Sticky-Notes</span>
                        </h4>
                    </div>
                    <div class="form-group">
                        <label for="noteSelect" style="margin-top: 20px;">Select Note:</label>
                        <div class="custom-dropdown">
                            <select class="form-control" id="noteSelect" name="title">
                                <option value="">Select Note</option>
                                <option th:each="note : ${notes}"
                                    th:value="${note.title}"
                                    th:text="${note.title}"
                                    th:attr="data-note-id=${note.id}"></option>
                            </select>
                            <span class="arrow-icon">&#9660;</span>
                        </div>
                    </div>
                    <div class="col-md-35">
                        <div class="text-center">
                            <button type="button" class="button" id="viewButton" disabled>View</button>
                            <button type="button" class="button" id="editButton" disabled>Edit</button>
                            <button type="button" class="button" id="deleteButton" disabled>Delete</button>
                            <button type="button" class="button" id="submitButton" disabled>Submit</button>
                            <br><br><br><br><br><br>
                            <div class="col-md-5" style="display: block; margin-top: 150px;">
                                <a href="/after_login_dashboard" class="button dashboard-button">
                                    <img src="https://cdn-iconspng.flaticon.com/128/10696/10696056.png" alt="Back Icon"
                                        class="icon">Dashboard
                                </a>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Right column -->
                <div class="col-md-6">
                    <div class="cards" id="cards">
                        <div class="card">
                            <h2 class="card__title" contenteditable="false" id="cardTitle">Card Title</h2>
                            <p class="card__link" contenteditable="false" id="cardContent">Select a note and click View.</p>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>

    <!-- Notes data from server (safe JSON, no Thymeleaf JS inlining issues) -->
    <script type="application/json" id="notes-data" th:utext="${notesJson} ?: '[]'"></script>

    <script>
        var notes = [];
        try {
            notes = JSON.parse(document.getElementById("notes-data").textContent.trim());
        } catch (e) {
            console.error("Could not load notes:", e);
            notes = [];
        }

        function findNoteByTitle(title) {
            if (!title) {
                return null;
            }
            return notes.find(function (note) {
                return note.title === title;
            });
        }

        function clearNoteDetails() {
            document.getElementById("cardTitle").textContent = "Card Title";
            document.getElementById("cardContent").textContent = "Select a note and click View.";
            document.getElementById("cardTitle").contentEditable = false;
            document.getElementById("cardContent").contentEditable = false;
            document.getElementById("editButton").disabled = true;
            document.getElementById("deleteButton").disabled = true;
            document.getElementById("viewButton").disabled = true;
            document.getElementById("submitButton").disabled = true;
        }

        function showSelectedNote() {
            var selectedTitle = document.getElementById("noteSelect").value;
            var note = findNoteByTitle(selectedTitle);

            if (!note) {
                clearNoteDetails();
                document.getElementById("viewButton").disabled = selectedTitle === "";
                return;
            }

            document.getElementById("cardTitle").textContent = note.title;
            document.getElementById("cardContent").textContent = note.content;
            document.getElementById("cardTitle").contentEditable = false;
            document.getElementById("cardContent").contentEditable = false;
            document.getElementById("editButton").disabled = false;
            document.getElementById("deleteButton").disabled = false;
            document.getElementById("viewButton").disabled = true;
            document.getElementById("submitButton").disabled = true;
        }

        document.getElementById("viewButton").addEventListener("click", function (event) {
            event.preventDefault();
            showSelectedNote();
        });

        document.getElementById("noteSelect").addEventListener("change", function () {
            clearNoteDetails();
            document.getElementById("viewButton").disabled = this.value === "";
        });

        document.getElementById("editButton").addEventListener("click", function (event) {
            event.preventDefault();
            document.getElementById("cardTitle").contentEditable = true;
            document.getElementById("cardContent").contentEditable = true;
            document.getElementById("submitButton").disabled = false;
            document.getElementById("editButton").disabled = true;
            document.getElementById("deleteButton").disabled = true;
            document.getElementById("viewButton").disabled = true;
        });

        function getSelectedNoteId() {
            var note = findNoteByTitle(document.getElementById("noteSelect").value);
            return note ? note.id : null;
        }

        function postNoteAction(url, onSuccess) {
            var noteId = getSelectedNoteId();
            if (!noteId) {
                console.error("Failed to find the note ID for the selected note title.");
                return;
            }

            var formData = new FormData();
            formData.append("title", document.getElementById("cardTitle").textContent);
            formData.append("content", document.getElementById("cardContent").textContent);

            var xhr = new XMLHttpRequest();
            xhr.open("POST", url, true);
            xhr.onreadystatechange = function () {
                if (xhr.readyState === XMLHttpRequest.DONE && xhr.status === 200) {
                    onSuccess();
                } else if (xhr.readyState === XMLHttpRequest.DONE) {
                    console.error("Request failed:", url);
                }
            };
            xhr.send(formData);
        }

        document.addEventListener("DOMContentLoaded", function () {
            document.getElementById("submitButton").addEventListener("click", function (event) {
                event.preventDefault();
                postNoteAction("/editnote/" + getSelectedNoteId(), function () {
                    localStorage.setItem("editedNoteTitle", document.getElementById("noteSelect").value);
                    location.reload();
                });
            });

            document.getElementById("deleteButton").addEventListener("click", function (event) {
                event.preventDefault();
                if (confirm("Are you sure you want to delete this note?")) {
                    postNoteAction("/deletenote/" + getSelectedNoteId(), function () {
                        location.reload();
                    });
                }
            });

            var editedNoteTitle = localStorage.getItem("editedNoteTitle");
            if (editedNoteTitle) {
                localStorage.removeItem("editedNoteTitle");
                document.getElementById("noteSelect").value = editedNoteTitle;
                showSelectedNote();
            }
        });
    </script>
</body>

</html>
