<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>View Student</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f0f0f0; }
        h3 { color: #333; }
        .details { background-color: white; padding: 25px; width: 420px; border: 1px solid #ccc; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #f5f5f5; width: 40%; }
        .actions { margin-top: 20px; }
        a.edit { background-color: #f0ad4e; color: white; padding: 8px 16px; text-decoration: none; border-radius: 4px; }
        a.back { background-color: #999; color: white; padding: 8px 16px; text-decoration: none; border-radius: 4px; margin-left: 8px; }
    </style>
</head>
<body>

<h3>Student Details</h3>

<div class="details">
    <table>
        <tr>
            <th>Student ID</th>
            <td th:text="${student.studentId}"></td>
        </tr>
        <tr>
            <th>Name</th>
            <td th:text="${student.studentName}"></td>
        </tr>
        <tr>
            <th>Email</th>
            <td th:text="${student.email}"></td>
        </tr>
        <tr>
            <th>Course</th>
            <td th:text="${student.course}"></td>
        </tr>
        <tr>
            <th>Duration</th>
            <td th:text="${student.duration}"></td>
        </tr>
    </table>

    <div class="actions">
        <a th:href="@{/students/edit/{id}(id=${student.studentId})}" class="edit">Edit</a>
        <a href="/students" class="back">Back</a>
    </div>
</div>

</body>
</html>
