<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Employee</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f0f0f0; }
        h3 { color: #333; }
        form { background-color: white; padding: 25px; width: 420px; border: 1px solid #ccc; border-radius: 5px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; margin-bottom: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .error { color: red; font-size: 13px; margin-bottom: 10px; display: block; }
        .group { margin-bottom: 15px; }
        button { background-color: #f0ad4e; color: white; padding: 9px 20px; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #ec971f; }
        a { color: white; background-color: #999; padding: 9px 16px; text-decoration: none; border-radius: 4px; margin-left: 8px; }
    </style>
</head>
<body>

<h3>Edit Employee</h3>

<form th:action="@{/edit/{id}(id=${employee.id})}" th:object="${employee}" method="post">

    <div class="group">
        <label>Employee ID</label>
        <input type="text" th:field="*{employeeId}">
        <span class="error" th:if="${#fields.hasErrors('employeeId')}" th:errors="*{employeeId}"></span>
    </div>

    <div class="group">
        <label>Name</label>
        <input type="text" th:field="*{name}">
        <span class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
    </div>

    <div class="group">
        <label>Department</label>
        <input type="text" th:field="*{department}">
        <span class="error" th:if="${#fields.hasErrors('department')}" th:errors="*{department}"></span>
    </div>

    <div class="group">
        <label>Salary</label>
        <input type="number" step="0.01" th:field="*{salary}">
        <span class="error" th:if="${#fields.hasErrors('salary')}" th:errors="*{salary}"></span>
    </div>

    <div class="group">
        <label>Joining Date</label>
        <input type="date" th:field="*{joiningDate}">
        <span class="error" th:if="${#fields.hasErrors('joiningDate')}" th:errors="*{joiningDate}"></span>
    </div>

    <button type="submit">Update</button>
    <a href="/">Cancel</a>
</form>

</body>
</html>
