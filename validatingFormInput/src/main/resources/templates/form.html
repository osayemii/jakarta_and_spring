<!DOCTYPE html>
<html xmlns:th = "http://www.thymeleaf.org">
<body>
    <!-- 1. Open the form tag here -->
    <form action="#"
          th:action = "@{/}"
          th:object = "${personForm}"
          method="post">
          
        <table>
            <tr>
                <td>Name:</td>
                <td>
                    <input type="text" th:field = "*{name}" />
                </td>
                <td th:if = "${#fields.hasErrors('name')}"
                    th:errors = "*{name}">
                    Name Error
                </td>
            </tr>
            <tr>
                <td>Age:</td>
                <td>
                    <input type="text" th:field = "*{age}" />
                </td>
                <td th:if = "${#fields.hasErrors('age')}"
                    th:errors = "*{age}"
                ></td>
            </tr>
            <tr>
                <td>
                    <button type = "submit">
                        Submit
                    </button>
                </td>
            </tr>
        </table>
    </form> <!-- 2. Close the form tag here instead -->
</body>
</html>
