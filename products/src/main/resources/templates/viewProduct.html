<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>View Product Details</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .form-group { margin-bottom: 15px; }
        label { display: inline-block; width: 150px; }
        input[type="text"], input[type="number"] { width: 300px; padding: 5px; }
        .btn { padding: 8px 15px; margin-right: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>View Product Details</h2>
    
    <!-- Select Product Dropdown -->
    <form action="/viewProduct" method="get">
        <div class="form-group">
            <label>Select Product ID:</label>
            <select name="selectedProductId" onchange="this.form.submit()">
                <option value="">-- Select Product --</option>
                <option th:each="prod : ${products}" 
                        th:value="${prod.productId}" 
                        th:text="${prod.productId}"
                        th:selected="${selectedProductId != null and selectedProductId == prod.productId}">
                </option>
            </select>
        </div>
    </form>

    <hr/>

    <!-- Selected Product Details and Actions -->
    <div th:if="${selectedProductId != null}">
        <form action="/actionProduct" method="post" th:object="${selectedProduct}">
            <input type="hidden" name="selectedProductId" th:value="${selectedProductId}" />
            
            <div class="form-group">
                <label>Product ID:</label>
                <input type="text" th:field="*{productId}" th:readonly="true" />
            </div>
            <div class="form-group">
                <label>Product Name:</label>
                <input type="text" th:field="*{productName}" th:readonly="${editMode == null or editMode == false}" />
            </div>
            <div class="form-group">
                <label>Product Description:</label>
                <input type="text" th:field="*{productDescription}" th:readonly="${editMode == null or editMode == false}" />
            </div>
            <div class="form-group">
                <label>Unit Price:</label>
                <input type="number" step="0.01" th:field="*{unitPrice}" th:readonly="${editMode == null or editMode == false}" />
            </div>
            
            <div style="margin-top: 20px;">
                <button type="submit" name="action" value="View" class="btn" th:if="${editMode == null or editMode == false}">View</button>
                <button type="submit" name="action" value="Edit" class="btn" th:if="${editMode == null or editMode == false}">Edit</button>
                <button type="submit" name="action" value="Delete" class="btn" th:if="${editMode == null or editMode == false}" onclick="return confirm('Are you sure you want to delete this product?');">Delete</button>
                <button type="submit" name="action" value="Submit" class="btn" th:if="${editMode != null and editMode == true}">Submit</button>
            </div>
        </form>
    </div>
    
    <div th:if="${selectedProductId == null}">
        <p>Please select a product from the list above.</p>
    </div>

    <br/>
    <a href="/">Back to Home</a>
</body>
</html>
